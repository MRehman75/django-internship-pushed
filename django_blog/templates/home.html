<!DOCTYPE html>
<html>

<head>
    <title>Blog Home</title>
</head>

<body>

    <h1>Welcome to the Blog</h1>

    {% for post in posts %}

    <h2>{{ post.title }}</h2>

    <p>{{ post.body }}</p>

    <p>
        Category: {{ post.category.name }} <br>
        Author: {{ post.author.username }} <br>
        Date: {{ post.created_at }}
    </p>

    <hr>

    {% empty %}

    <p>No published posts found.</p>

    {% endfor %}

</body>

</html>
